kind = "web"
previewPath = "/"
title = "PlacementPulse"
version = "1.0.0"
id = "artifacts/placement-prep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25494

[services.development]
run = "pnpm --filter @workspace/placement-prep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/placement-prep", "run", "build" ]
publicDir = "artifacts/placement-prep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25494"
BASE_PATH = "/"
